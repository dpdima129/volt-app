<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volt Payment Gateway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Весь твой стиль сохраняем, добавляем пару новых фишек */
        body { background: #08080a; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { width: 100%; max-width: 400px; background: #121216; border: 1px solid #222228; border-radius: 28px; padding: 24px; box-sizing: border-box; margin-bottom: 20px; }
        .badge { background: rgba(255, 174, 0, 0.1); color: #ffae00; padding: 6px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; margin-bottom: 15px; display: inline-block; }
        
        /* Секция активов */
        .assets { background: #1a1a20; border-radius: 20px; padding: 15px; margin: 20px 0; border: 1px solid #333; }
        .asset-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 14px; }
        .asset-val { color: #ffae00; font-weight: bold; }

        .payment-box { background: #000; border: 1px dashed #444; border-radius: 15px; padding: 15px; margin-top: 15px; }
        .addr { font-family: monospace; font-size: 11px; color: #00ffaa; word-break: break-all; margin: 10px 0; display: block; }
        
        .confirm-btn { background: #00ffaa; color: #000; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .buy-btn { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Volt ID: <span id="user-id">Loading...</span></div>
        <h1>Your Assets ⚡️</h1>
        
        <div class="assets">
            <div class="asset-row"><span>Reserved VOLT:</span> <span class="asset-val">0.00</span></div>
            <div class="asset-row"><span>Total Invested:</span> <span class="asset-val">$0.00</span></div>
            <div class="asset-row"><span>Status:</span> <span style="color: #666;">No active deposits</span></div>
        </div>

        <button class="buy-btn" id="main-buy" onclick="openGate()">Buy VOLT Now</button>

        <div id="gate" style="display: none;">
            <div class="payment-box">
                <span style="font-size: 12px; color: #888;">Deposit USDT (TRC20):</span>
                <span class="addr">TDMdmJJriad71a4tHYCqruLggtJZ8gz1Lc</span>
                <button class="confirm-btn" onclick="notifyBot()">I HAVE SENT PAYMENT</button>
            </div>
            <p style="font-size: 10px; color: #555; text-align: center; margin-top: 10px;">Min: 5 USDT. Send screenshot to bot after transfer.</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Показываем ID юзера для солидности
        document.getElementById('user-id').innerText = tg.initDataUnsafe?.user?.id || 'Guest';

        function openGate() {
            document.getElementById('gate').style.display = 'block';
            document.getElementById('main-buy').style.display = 'none';
            tg.HapticFeedback.impactOccurred('medium');
        }

        function notifyBot() {
            tg.sendData("confirm_payment"); // Бот получит сигнал, что юзер якобы заплатил
            tg.close(); // Закрываем окно, чтобы юзер оказался в чате с ботом
        }

        tg.ready();
    </script>
</body>
</html>
