<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volt AI | Presale & Arcade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --volt: #ffae00; --bg: #030305; --glass: rgba(15, 15, 18, 0.8); }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 80px 0; display: flex; flex-direction: column; align-items: center; background-image: radial-gradient(circle at 50% -20%, rgba(255, 174, 0, 0.15) 0%, transparent 60%); }
        
        /* --- БЛОК ПРЕСЕЙЛА (Восстановлен полностью) --- */
        .main-card { width: 94%; max-width: 450px; background: var(--glass); border: 1px solid rgba(255, 174, 0, 0.2); border-radius: 32px; padding: 30px 24px; box-shadow: 0 0 40px rgba(0,0,0,1); margin-top: 20px; z-index: 10; }
        .header { width: 100%; padding: 25px; display: flex; justify-content: space-between; align-items: center; max-width: 500px; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--volt); text-shadow: 0 0 15px rgba(255,174,0,0.5); }
        .personal-card { background: rgba(255, 174, 0, 0.03); border: 1px solid rgba(255,174,0,0.15); border-radius: 24px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .p-val { color: var(--volt); font-size: 20px; font-weight: 900; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .stat-label { color: #888; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 22px; font-weight: 900; }
        .progress-container { margin-bottom: 30px; }
        .bar-bg { background: #111; height: 16px; border-radius: 100px; overflow: hidden; border: 1px solid #222; }
        .bar-fill { background: linear-gradient(90deg, #ff8c00, #ffae00); width: 0%; height: 100%; transition: width 2s ease; }
        .payment-zone { background: #000; border: 1px solid #222; border-radius: 24px; padding: 20px; text-align: center; margin-top: 15px; display: none; }
        .wallet-addr { font-family: monospace; font-size: 12px; color: #00ffaa; display: block; background: #111; padding: 12px; border-radius: 12px; margin: 15px 0; border: 1px dashed #333; user-select: all; }
        .tx-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 16px; margin-bottom: 15px; outline: none; }
        .btn-main { background: #fff; color: #000; border: none; width: 100%; padding: 20px; border-radius: 20px; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* --- ИГРОВЫЕ БЛОКИ --- */
        .game-wrapper { width: 94%; max-width: 450px; background: #000; border: 3px solid #333; border-radius: 16px; margin-top: 25px; overflow: hidden; position: relative; }
        .game-header { background: #111; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
        .game-title { font-family: 'Press Start 2P', cursive; font-size: 8px; color: #00ffaa; }
        .game-score { font-family: 'Press Start 2P', cursive; font-size: 9px; color: var(--volt); }
        canvas { width: 100%; display: block; image-rendering: pixelated; background: #050505; }
        
        .fs-btn { background: #333; color: var(--volt); border: 1px solid var(--volt); padding: 6px 10px; font-family: 'Press Start 2P', cursive; font-size: 7px; border-radius: 6px; cursor: pointer; }
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; cursor: pointer; }
        
        /* Полноэкранный режим */
        .fullscreen-active { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; background: #000; display: flex; flex-direction: column; max-width: 100%; border-radius: 0; border: none; margin: 0; }
        .fullscreen-active canvas { flex-grow: 1; object-fit: contain; max-height: 65vh; }
        .controls { display: none; background: #0a0a0a; padding: 20px; justify-content: space-between; align-items: center; width: 100%; }
        .fullscreen-active .controls { display: flex; height: 35vh; }

        /* Джойстик */
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 5px; }
        .btn-d { background: #222; border: 2px solid #444; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 24px; user-select: none;}
        .btn-d:active { background: var(--volt); color: #000; border-color: var(--volt); }
        .btn-f { width: 80px; height: 80px; background: #c00; border: 4px solid #f00; border-radius: 50%; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 10px; box-shadow: 0 5px 0 #600; display: flex; justify-content: center; align-items: center; user-select: none; }
        .btn-f:active { transform: translateY(5px); box-shadow: none; background: #f00; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">VOLT<span>AI</span></div>
        <div style="font-size: 11px; font-weight: 800; color: var(--volt);">● ON-CHAIN</div>
    </div>

    <div class="main-card">
        <div class="personal-card">
            <div><span class="stat-label">Allocation</span><span class="p-val" id="my-volt">0.00 VOLT</span></div>
            <div style="text-align: right;"><span class="stat-label">Invested</span><span id="my-usd" style="font-weight: 900;">0.00 USDT</span></div>
        </div>
        <div class="stats-row">
            <div><span class="stat-label">Current Phase</span><span class="stat-value" id="phase-num">Phase 1</span></div>
            <div style="text-align: right;"><span class="stat-label">Total Raised</span><span class="stat-value" id="total-raised" style="color: var(--volt);">0.00 USDT</span></div>
        </div>
        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 5px;">
                <span id="percent-text">0.0%</span><span id="goal-text">Goal: 50k USDT</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="progress-bar"></div></div>
        </div>
        <div id="payment-area" class="payment-zone">
            <span class="stat-label">Send USDT (TRC20) to:</span>
            <span class="wallet-addr">TDMdmJJriad71a4tHYCqruLggtJZ8gz1Lc</span>
            <input type="text" id="tx-hash" class="tx-input" placeholder="Paste TxID here">
            <button class="btn-main" style="background: linear-gradient(90deg, #00ffaa, #00cc88);" onclick="submitTx()">Verify Deposit</button>
        </div>
        <button class="btn-main" id="buy-btn" onclick="showPay()">Participate in Presale</button>
    </div>

    <div class="game-wrapper" id="wrap-race">
        <div class="game-header">
            <div><span class="game-title">CYBER RACER</span><button class="fs-btn" style="margin-left:10px" onclick="toggleFS('wrap-race')">FULLSCREEN</button></div>
            <span class="game-score" id="score-race">ENG: 0.000</span>
        </div>
        <canvas id="raceCanvas" width="240" height="200"></canvas>
        <div class="controls">
            <div style="display:flex; gap:15px;">
                <div class="btn-d" style="width:70px; height:70px;" onpointerdown="rIn='L'" onpointerup="rIn=null">◄</div>
                <div class="btn-d" style="width:70px; height:70px;" onpointerdown="rIn='R'" onpointerup="rIn=null">►</div>
            </div>
            <div class="btn-f" style="background:#0088ff; border-color:#00aaff; box-shadow:0 5px 0 #0055aa;" onpointerdown="rBoost=true" onpointerup="rBoost=false">TURBO</div>
        </div>
        <div class="game-overlay" id="ov-race" onclick="startRace()">
            <div style="font-family:'Press Start 2P', cursive; color:var(--volt); font-size:12px;">START ENGINE</div>
        </div>
    </div>

    <div class="game-wrapper" id="wrap-tank">
        <div class="game-header">
            <div><span class="game-title">BATTLE CITY</span><button class="fs-btn" style="margin-left:10px" onclick="toggleFS('wrap-tank')">FULLSCREEN</button></div>
            <span class="game-score" id="score-tank">ENG: 0.000</span>
        </div>
        <canvas id="tankCanvas" width="240" height="240"></canvas>
        <div class="controls">
            <div class="dpad">
                <div class="btn-d" style="grid-column:2; grid-row:1" onpointerdown="tIn='U'" onpointerup="tIn=null">▲</div>
                <div class="btn-d" style="grid-column:1; grid-row:2" onpointerdown="tIn='L'" onpointerup="tIn=null">◄</div>
                <div class="btn-d" style="grid-column:3; grid-row:2" onpointerdown="tIn='R'" onpointerup="tIn=null">►</div>
                <div class="btn-d" style="grid-column:2; grid-row:3" onpointerdown="tIn='D'" onpointerup="tIn=null">▼</div>
            </div>
            <div class="btn-f" onpointerdown="tFire()">FIRE</div>
        </div>
        <div class="game-overlay" id="ov-tank" onclick="startTank()">
            <div style="font-family:'Press Start 2P', cursive; color:var(--volt); font-size:12px;">START MISSION</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.headerColor = '#030305';

        // === ОБЩАЯ СИСТЕМА ЭНЕРГИИ (КОПЕЙКИ) ===
        let globalScore = parseFloat(localStorage.getItem('v_score') || 0);
        function addScore(amount) {
            globalScore += amount;
            localStorage.setItem('v_score', globalScore);
            document.getElementById('score-race').innerText = 'ENG: ' + globalScore.toFixed(3);
            document.getElementById('score-tank').innerText = 'ENG: ' + globalScore.toFixed(3);
            if(amount > 0 && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        addScore(0); // Инициализация на старте

        // === ЛОГИКА ПРЕСЕЙЛА ===
        const params = new URLSearchParams(window.location.search);
        const raised = parseFloat(params.get('raised') || 0);
        const goal = parseFloat(params.get('goal') || 50000);
        const phase = params.get('phase') || 1;
        
        document.getElementById('my-volt').innerText = parseFloat(params.get('volt') || 0).toFixed(2) + ' VOLT';
        document.getElementById('my-usd').innerText = parseFloat(params.get('usd') || 0).toFixed(2) + ' USDT';
        document.getElementById('total-raised').innerText = raised.toFixed(2) + ' USDT';
        document.getElementById('phase-num').innerText = 'Phase ' + phase;
        document.getElementById('goal-text').innerText = 'Goal: ' + goal.toLocaleString() + ' USDT';

        let pct = (raised / goal) * 100;
        setTimeout(() => {
            document.getElementById('progress-bar').style.width = (pct > 100 ? 100 : pct) + '%';
            document.getElementById('percent-text').innerText = pct.toFixed(1) + '% Sold';
        }, 500);

        function showPay() { document.getElementById('payment-area').style.display='block'; document.getElementById('buy-btn').style.display='none'; }
        function submitTx() { let h = document.getElementById('tx-hash').value; if(h.length>10){tg.sendData("txid:"+h); tg.close();} }

        // === ПОЛНОЭКРАННЫЙ РЕЖИМ ===
        function toggleFS(id) {
            const el = document.getElementById(id);
            if(!document.fullscreenElement) {
                el.classList.add('fullscreen-active');
                if(el.requestFullscreen) el.requestFullscreen();
            } else {
                document.exitFullscreen();
                el.classList.remove('fullscreen-active');
            }
        }

        // === ИГРА 1: КИБЕР-ГОНКА ===
        const rc = document.getElementById('raceCanvas'), rCtx = rc.getContext('2d');
        let rRun = false, rX = 100, rIn = null, rBoost = false, bats = [];
        
        function startRace() { document.getElementById('ov-race').style.display='none'; rRun=true; bats=[]; rLoop(); }

        function drawCar(x, y, color) {
            rCtx.fillStyle = color; rCtx.fillRect(x+4, y, 12, 30); // Кузов
            rCtx.fillStyle = "#000"; rCtx.fillRect(x, y+4, 4, 8); rCtx.fillRect(x+16, y+4, 4, 8); rCtx.fillRect(x, y+18, 4, 8); rCtx.fillRect(x+16, y+18, 4, 8); // Колеса
            rCtx.fillStyle = "#00ffff"; rCtx.fillRect(x+6, y+6, 8, 6); // Стекло
            rCtx.fillStyle = color; rCtx.fillRect(x, y+24, 20, 4); // Спойлер
        }

        function rLoop() {
            if(!rRun) return;
            rCtx.fillStyle="#080808"; rCtx.fillRect(0,0,240,200);
            rCtx.fillStyle="#333"; rCtx.fillRect(118, (performance.now()/20)%200, 4, 40); // Дорога
            
            if(rIn=='L') rX-=2.5; if(rIn=='R') rX+=2.5;
            rX = Math.max(10, Math.min(210, rX));
            drawCar(rX, 150, "#ffae00");

            // Батарейки (энергия)
            if(Math.random()<0.03) bats.push({x:Math.random()*210, y:-20});
            for(let i=bats.length-1; i>=0; i--) {
                let b = bats[i];
                b.y += (rBoost ? 4 : 2);
                rCtx.fillStyle="#00ffaa"; rCtx.fillRect(b.x, b.y, 10, 10);
                
                // Сбор
                if(rX < b.x+10 && rX+20 > b.x && 150 < b.y+10 && 180 > b.y) {
                    addScore(0.001); bats.splice(i, 1);
                } else if(b.y > 200) {
                    bats.splice(i, 1);
                }
            }
            requestAnimationFrame(rLoop);
        }

        // === ИГРА 2: ТАНЧИКИ ===
        const tc = document.getElementById('tankCanvas'), tCtx = tc.getContext('2d');
        let tRun = false, tIn = null, pT = {x:110, y:200, d:'U'}, bulls = [], walls = [], bots = [];

        function startTank() { document.getElementById('ov-tank').style.display='none'; tRun=true; tSpawn(); tLoop(); }
        function tFire() { if(bulls.filter(b=>b.own).length < 2) bulls.push({x:pT.x+8, y:pT.y+8, d:pT.d, own:true}); }

        function drawTank(x, y, d, c) {
            tCtx.fillStyle = c; tCtx.fillRect(x+4, y+4, 12, 12);
            tCtx.fillStyle = "#333";
            if(d=='U'||d=='D') { 
                tCtx.fillRect(x,y,4,20); tCtx.fillRect(x+16,y,4,20); 
                tCtx.fillStyle="#888"; tCtx.fillRect(x+9, d=='U'?y:y+12, 2, 8);
            } else { 
                tCtx.fillRect(x,y,20,4); tCtx.fillRect(x,y+16,20,4); 
                tCtx.fillStyle="#888"; tCtx.fillRect(d=='L'?x:x+12, y+9, 8, 2);
            }
        }

        function tSpawn() {
            walls=[]; bots=[]; bulls=[];
            for(let i=0; i<5; i++) for(let j=0; j<3; j++) walls.push({x:40+i*40, y:40+j*45});
            bots.push({x:10, y:10, d:'D', m:0}, {x:210, y:10, d:'D', m:0});
        }

        function tLoop() {
            if(!tRun) return;
            tCtx.fillStyle="#000"; tCtx.fillRect(0,0,240,240);

            // Игрок
            if(tIn) {
                pT.d = tIn;
                if(tIn=='U') pT.y-=1; if(tIn=='D') pT.y+=1;
                if(tIn=='L') pT.x-=1; if(tIn=='R') pT.x+=1;
                pT.x = Math.max(0, Math.min(220, pT.x)); pT.y = Math.max(0, Math.min(220, pT.y));
            }
            drawTank(pT.x, pT.y, pT.d, "#ffae00");

            // Стены (Кирпичи)
            walls.forEach(w => {
                tCtx.fillStyle="#a52a2a"; tCtx.fillRect(w.x, w.y, 20, 20);
                tCtx.strokeStyle="#000"; tCtx.strokeRect(w.x, w.y, 20, 20);
            });

            // Боты
            for(let i=bots.length-1; i>=0; i--) {
                let b = bots[i]; b.m++;
                if(b.m>60) { b.d=['U','D','L','R'][Math.floor(Math.random()*4)]; b.m=0; }
                if(b.d=='U') b.y-=0.5; if(b.d=='D') b.y+=0.5; if(b.d=='L') b.x-=0.5; if(b.d=='R') b.x+=0.5;
                b.x = Math.max(0, Math.min(220, b.x)); b.y = Math.max(0, Math.min(220, b.y));
                drawTank(b.x, b.y, b.d, "#f00");
                if(Math.random()<0.01) bulls.push({x:b.x+8, y:b.y+8, d:b.d, own:false}); // Бот стреляет
            }

            // Пули
            for(let i=bulls.length-1; i>=0; i--) {
                let b = bulls[i]; let hit = false;
                if(b.d=='U') b.y-=3; if(b.d=='D') b.y+=3; if(b.d=='L') b.x-=3; if(b.d=='R') b.x+=3;
                tCtx.fillStyle = b.own ? "#fff" : "#ff0"; tCtx.fillRect(b.x, b.y, 4, 4);
                
                // Проверка стен
                for(let wi=walls.length-1; wi>=0; wi--) {
                    let w = walls[wi];
                    if(b.x>w.x && b.x<w.x+20 && b.y>w.y && b.y<w.y+20) { 
                        walls.splice(wi,1); bulls.splice(i,1); hit=true;
                        if(b.own) addScore(0.001); // Копеечка за кирпич!
                        break; 
                    }
                }
                
                // Проверка ботов
                if(b.own && !hit) {
                    for(let bi=bots.length-1; bi>=0; bi--) {
                        let bot = bots[bi];
                        if(b.x>bot.x && b.x<bot.x+20 && b.y>bot.y && b.y<bot.y+20) {
                            bots.splice(bi,1); bulls.splice(i,1); hit=true;
                            addScore(0.010); // Больше энергии за килл
                            if(bots.length===0) setTimeout(tSpawn, 2000); // Респаун
                            break;
                        }
                    }
                }
                if(!hit && (b.x<0 || b.x>240 || b.y<0 || b.y>240)) bulls.splice(i,1);
            }
            requestAnimationFrame(tLoop);
        }
    </script>
</body>
</html>
