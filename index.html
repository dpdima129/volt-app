<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volt Token</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            background: radial-gradient(circle at center, #2a2a35 0%, #101014 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .header {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }
        .score-container {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 50px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }
        #battery-button {
            width: 220px;
            height: 220px;
            background: linear-gradient(135deg, #ffdd00, #ff8c00);
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 0 50px rgba(255, 140, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.6);
            font-size: 80px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s;
            position: relative;
            -webkit-tap-highlight-color: transparent; 
        }
        #battery-button:active {
            transform: scale(0.92);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.8);
        }
        .floating-number {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
        }
        
        /* Стили для индикатора загрузки (чтобы было видно, что игра коннектится к серверу) */
        #loading-status {
            font-size: 14px;
            color: #aaaaaa;
            margin-top: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="header">VOLT TOKEN</div>
    
    <div class="score-container">
        <span id="energy-count">0</span>
    </div>

    <div id="battery-button">⚡️</div>
    
    <div id="loading-status">Синхронизация с сервером...</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let energyCount = document.getElementById('energy-count');
        let batteryBtn = document.getElementById('battery-button');
        let statusText = document.getElementById('loading-status');
        
        let currentEnergy = 0;
        let isDataLoaded = false; 

        // 1. ЗАГРУЗКА БАЛАНСА ПРИ ОТКРЫТИИ ИГРЫ
        // Обращаемся к облаку Телеграма за сохраненными монетами
        tg.CloudStorage.getItem('volt_score', (err, value) => {
            if (!err && value) {
                currentEnergy = parseInt(value); // Переводим текст в число
                energyCount.innerText = currentEnergy;
            }
            isDataLoaded = true; // Разрешаем тапать только после проверки баланса
            statusText.innerText = "Готово!";
            setTimeout(() => statusText.innerText = "", 2000); // Прячем надпись через 2 сек
        });

        // 2. ЛОГИКА ТАПОВ
        batteryBtn.addEventListener('pointerdown', (e) => {
            if (!isDataLoaded) return; // Защита от накрутки до загрузки базы

            currentEnergy += 1;
            energyCount.innerText = currentEnergy;
            tg.HapticFeedback.impactOccurred('medium');

            const plusOne = document.createElement('div');
            plusOne.classList.add('floating-number');
            plusOne.innerText = '+1';
            
            const rect = batteryBtn.getBoundingClientRect();
            plusOne.style.left = `${e.clientX - rect.left}px`;
            plusOne.style.top = `${e.clientY - rect.top}px`;
            
            batteryBtn.appendChild(plusOne);

            setTimeout(() => {
                plusOne.remove();
            }, 800);
        });

        // 3. АВТОСОХРАНЕНИЕ В ОБЛАКО
        // Сохраняем баланс каждые 3 секунды. 
        // Не делаем это при каждом тапе, чтобы Телеграм не заблокировал нас за спам запросами!
        setInterval(() => {
            if (isDataLoaded) {
                // В облако можно сохранять только текст (строки), поэтому переводим число в строку
                tg.CloudStorage.setItem('volt_score', currentEnergy.toString());
            }
        }, 3000);

        tg.ready();
    </script>
</body>
</html>
