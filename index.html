<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volt Token Presale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #0d0d0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background: #16161a;
            border: 1px solid #2a2a30;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .badge {
            background: rgba(255, 140, 0, 0.2);
            color: #ff8c00;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 { font-size: 24px; margin: 10px 0; }
        .price-box {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 14px;
            color: #aaa;
        }
        .price-value { color: #fff; font-size: 18px; font-weight: bold; }
        
        /* Прогресс-бар как в Blazpay */
        .progress-container {
            background: #25252b;
            height: 12px;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, #ff8c00, #ffdd00);
            height: 100%;
            width: 75%; /* Управляем процентом сборов */
            box-shadow: 0 0 15px #ff8c00;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .buy-btn {
            background: linear-gradient(135deg, #ff8c00, #ffdd00);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .buy-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">PRESALE IS LIVE</div>
        <h1>Volt Token ⚡</h1>
        <p style="color: #888; font-size: 14px;">Supercharged by AI, Unleashed by Volt Engine.</p>

        <div class="price-box">
            <div>Current Price<br><span class="price-value">$0.0025</span></div>
            <div style="text-align: right;">Next Phase<br><span class="price-value">$0.0050</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="stats">
            <span>75% Complete</span>
            <span>Raised: $185,400</span>
        </div>

        <button class="buy-btn" onclick="buyTokens()">Buy VOLT Now</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function buyTokens() {
            // Здесь мы будем вызывать окно оплаты
            tg.showPopup({
                title: 'Покупка VOLT',
                message: 'Выберите метод оплаты (USDT TRC20)',
                buttons: [{text: 'Оплатить', type: 'default'}]
            });
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
