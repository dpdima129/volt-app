<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volt AI | Transparent Presale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --volt: #ffae00; --bg: #030305; --glass: rgba(15, 15, 18, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at 50% -20%, rgba(255, 174, 0, 0.15) 0%, transparent 60%);
        }

        /* Эффект мерцания электричества по краям */
        .main-card { 
            width: 92%; max-width: 450px; background: var(--glass); 
            border: 1px solid rgba(255, 174, 0, 0.2); border-radius: 32px; 
            padding: 30px 24px; box-shadow: 0 0 40px rgba(0,0,0,1), 0 0 20px rgba(255, 174, 0, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            margin-top: 20px; position: relative;
        }

        .header { width: 100%; padding: 25px; display: flex; justify-content: space-between; align-items: center; max-width: 500px; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--volt); text-shadow: 0 0 15px rgba(255,174,0,0.5); }

        .personal-card { 
            background: rgba(255, 174, 0, 0.03); border: 1px solid rgba(255,174,0,0.15);
            border-radius: 24px; padding: 20px; margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .p-val { color: var(--volt); font-size: 20px; font-weight: 900; }

        .stats-row { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .stat-label { color: #888; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 22px; font-weight: 900; }

        /* Прогресс-бар */
        .progress-container { margin-bottom: 30px; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; color: #aaa; font-weight: 600; }
        .bar-bg { background: #111; height: 16px; border-radius: 100px; overflow: hidden; border: 1px solid #222; }
        .bar-fill { 
            background: linear-gradient(90deg, #ff8c00, #ffae00); width: 0%; height: 100%; 
            box-shadow: 0 0 20px rgba(255,174,0,0.4); transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .payment-zone { background: #000; border: 1px solid #222; border-radius: 24px; padding: 20px; text-align: center; margin-top: 15px; display: none; }
        .wallet-addr { font-family: monospace; font-size: 12px; color: #00ffaa; display: block; background: #111; padding: 12px; border-radius: 12px; margin: 15px 0; border: 1px dashed #333; }
        
        .tx-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 16px; margin-bottom: 15px; outline: none; }
        .tx-input:focus { border-color: var(--volt); }

        .btn-main { 
            background: #fff; color: #000; border: none; width: 100%; padding: 20px; 
            border-radius: 20px; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .btn-verify { background: linear-gradient(90deg, #00ffaa, #00cc88); margin-top: 10px; }

        .live-tx-empty { text-align: center; padding: 30px; color: #444; font-size: 13px; border: 1px dashed #222; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">VOLT<span>AI</span></div>
        <div class="status-tag" style="font-size: 11px; font-weight: 800; color: var(--volt);">● ON-CHAIN VERIFIED</div>
    </div>

    <div class="main-card">
        <div class="personal-card">
            <div><span class="stat-label">Your Allocation</span><span class="p-val" id="my-volt">0.00 VOLT</span></div>
            <div style="text-align: right;"><span class="stat-label">Invested</span><span id="my-usd" style="font-weight: 900;">0.00 USDT</span></div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-label">Current Phase</span>
                <span class="stat-value" id="phase-num">Phase 1</span>
            </div>
            <div class="stat-box" style="text-align: right;">
                <span class="stat-label">Total Raised</span>
                <span class="stat-value" id="total-raised" style="color: var(--volt);">0.00 USDT</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-labels"><span id="percent-text">0.0% Sold</span><span id="goal-text">Goal: 50,000 USDT</span></div>
            <div class="bar-bg"><div class="bar-fill" id="progress-bar"></div></div>
        </div>

        <div id="payment-area" class="payment-zone">
            <span class="stat-label">Send USDT (TRC20) to:</span>
            <span class="wallet-addr">TDMdmJJriad71a4tHYCqruLggtJZ8gz1Lc</span>
            <input type="text" id="tx-hash" class="tx-input" placeholder="Paste TxID (Hash) here">
            <button class="btn-main btn-verify" onclick="submitTx()">Verify Transaction</button>
        </div>

        <button class="btn-main" id="buy-btn" onclick="showPay()">Participate in Presale</button>
    </div>

    <div style="width: 92%; max-width: 450px; margin-top: 25px;">
        <span class="stat-label">Network Status</span>
        <div class="live-tx-empty">Waiting for new on-chain transactions...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#030305';

        const params = new URLSearchParams(window.location.search);
        const raised = parseFloat(params.get('raised') || 0);
        const goal = parseFloat(params.get('goal') || 50000);
        const phase = params.get('phase') || 1;
        
        // Личные данные юзера
        document.getElementById('my-volt').innerText = parseFloat(params.get('volt') || 0).toFixed(2) + ' VOLT';
        document.getElementById('my-usd').innerText = parseFloat(params.get('usd') || 0).toFixed(2) + ' USDT';

        // Данные блокчейна
        document.getElementById('total-raised').innerText = raised.toFixed(2) + ' USDT';
        document.getElementById('phase-num').innerText = 'Phase ' + phase;
        document.getElementById('goal-text').innerText = 'Goal: ' + goal.toLocaleString() + ' USDT';

        // Прогресс
        let pct = (raised / goal) * 100;
        setTimeout(() => {
            document.getElementById('progress-bar').style.width = (pct > 100 ? 100 : pct) + '%';
            document.getElementById('percent-text').innerText = pct.toFixed(1) + '% Sold';
        }, 300);

        function showPay() {
            document.getElementById('payment-area').style.display = 'block';
            document.getElementById('buy-btn').style.display = 'none';
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        function submitTx() {
            let h = document.getElementById('tx-hash').value.trim();
            if(h.length < 10) return alert("Enter TxID");
            tg.sendData("txid:" + h);
            tg.close();
        }
        tg.ready();
    </script>
</body>
</html>
