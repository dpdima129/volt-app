<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volt Token | Leading AI Ecosystem</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffae00; --bg: #050505; --card: #111114; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; max-width: 500px; }
        .logo { font-weight: 900; font-size: 20px; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--accent); }

        .hero { text-align: center; padding: 40px 20px; max-width: 500px; }
        .hero h1 { font-size: 32px; font-weight: 900; margin: 0; line-height: 1.1; }
        .hero p { color: #888; font-size: 14px; margin-top: 10px; }

        .main-card { width: 92%; max-width: 450px; background: var(--card); border: 1px solid #222; border-radius: 32px; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .status-tag { background: rgba(255,174,0,0.1); color: var(--accent); padding: 4px 12px; border-radius: 100px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid rgba(255,174,0,0.2); }
        
        .stats-row { display: flex; justify-content: space-between; margin: 25px 0; }
        .stat-box { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { color: #555; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: 800; }

        .progress-container { margin-bottom: 30px; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #888; }
        .bar-bg { background: #222; height: 12px; border-radius: 10px; position: relative; overflow: hidden; }
        .bar-fill { background: linear-gradient(90deg, #ff8c00, var(--accent)); width: 90.3%; height: 100%; box-shadow: 0 0 15px var(--accent); }

        .input-group { background: #000; border: 1px solid #333; border-radius: 16px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .wallet-addr { font-family: monospace; font-size: 11px; color: var(--accent); word-break: break-all; margin: 10px 0; display: block; }
        
        .btn-main { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-main:active { transform: scale(0.97); }

        /* Табы: Dashboard и Buy */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 92%; max-width: 450px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #1a1a1c; border-radius: 12px; font-size: 13px; font-weight: 600; color: #666; cursor: pointer; }
        .tab.active { background: #222; color: #fff; border: 1px solid #333; }

        .live-tx { width: 92%; max-width: 450px; margin-top: 30px; }
        .tx-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1a1a1c; font-size: 12px; }
        .tx-user { color: #666; }
        .tx-amt { color: #00ffaa; font-weight: 800; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">VOLT<span>PAY</span></div>
        <div class="status-tag">Presale Phase 8</div>
    </div>

    <div class="hero">
        <h1>Supercharged by AI</h1>
        <p>The first automated energy ecosystem on Telegram.</p>
    </div>

    <div class="tabs">
        <div class="tab active">Presale</div>
        <div class="tab">My Allocation</div>
    </div>

    <div class="main-card">
        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-label">Current Price</span>
                <span class="stat-value">$0.0205</span>
            </div>
            <div class="stat-box" style="text-align: right;">
                <span class="stat-label">Total Raised</span>
                <span class="stat-value" style="color: var(--accent);">$2,512,400</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-labels">
                <span>90.3% Sold Out</span>
                <span>Goal: $2.75M</span>
            </div>
            <div class="bar-bg"><div class="bar-fill"></div></div>
        </div>

        <div class="input-group">
            <span class="stat-label">Transfer USDT (TRC20) to:</span>
            <span class="wallet-addr">TDMdmJJriad71a4tHYCqruLggtJZ8gz1Lc</span>
            <p style="font-size: 10px; color: #444; margin: 0;">Min deposit: 5 USDT</p>
        </div>

        <button class="btn-main" onclick="confirmTx()">Verify My Payment</button>
    </div>

    <div class="live-tx" id="tx-feed">
        <div style="font-size: 11px; font-weight: 800; color: #444; text-transform: uppercase; margin-bottom: 15px;">Live Transactions</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#050505';

        function confirmTx() {
            // При нажатии бот попросит ввести Hash транзакции для авто-проверки
            tg.sendData("verify_request");
            tg.close();
        }

        // Генерация реалистичной текучки
        const feed = document.getElementById('tx-feed');
        function addTx() {
            const users = ['0x4f...d2', '0x1a...9c', '0xbb...11', '0x7e...e4', '0x21...ff'];
            const amts = ['15.00', '5.00', '125.00', '40.00', '8.50', '250.00'];
            const item = `<div class="tx-item"><span class="tx-user">${users[Math.floor(Math.random()*users.length)]}</span><span class="tx-amt">+$${amts[Math.floor(Math.random()*amts.length)]}</span></div>`;
            feed.insertAdjacentHTML('afterbegin', item);
            if(feed.children.length > 6) feed.lastElementChild.remove();
        }
        setInterval(addTx, 5000);
        addTx(); addTx();

        tg.ready();
    </script>
</body>
</html>
