<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volt AI | Transparent Presale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --volt: #ffae00; --bg: #030305; --glass: rgba(15, 15, 18, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0 0 60px 0; display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at 50% -20%, rgba(255, 174, 0, 0.15) 0%, transparent 60%);
        }

        /* --- UI БЛОКИ ПРЕСЕЙЛА --- */
        .main-card { 
            width: 92%; max-width: 450px; background: var(--glass); 
            border: 1px solid rgba(255, 174, 0, 0.2); border-radius: 32px; 
            padding: 30px 24px; box-shadow: 0 0 40px rgba(0,0,0,1);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            margin-top: 20px; z-index: 10;
        }

        .header { width: 100%; padding: 25px; display: flex; justify-content: space-between; align-items: center; max-width: 500px; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--volt); text-shadow: 0 0 15px rgba(255,174,0,0.5); }

        .personal-card { 
            background: rgba(255, 174, 0, 0.03); border: 1px solid rgba(255,174,0,0.15);
            border-radius: 24px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .p-val { color: var(--volt); font-size: 20px; font-weight: 900; }

        .stats-row { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .stat-label { color: #888; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 22px; font-weight: 900; }

        .progress-container { margin-bottom: 30px; }
        .bar-bg { background: #111; height: 16px; border-radius: 100px; overflow: hidden; border: 1px solid #222; }
        .bar-fill { background: linear-gradient(90deg, #ff8c00, #ffae00); width: 0%; height: 100%; transition: width 2s ease; }

        .payment-zone { background: #000; border: 1px solid #222; border-radius: 24px; padding: 20px; text-align: center; margin-top: 15px; display: none; }
        .wallet-addr { font-family: monospace; font-size: 12px; color: #00ffaa; display: block; background: #111; padding: 12px; border-radius: 12px; margin: 15px 0; border: 1px dashed #333; user-select: all; }
        .tx-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 16px; margin-bottom: 15px; outline: none; }

        .btn-main { background: #fff; color: #000; border: none; width: 100%; padding: 20px; border-radius: 20px; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* --- ОБЩИЕ СТИЛИ ДЛЯ ИГР --- */
        .game-wrapper {
            width: 92%; max-width: 450px; background: #000; border: 2px solid #333; 
            border-radius: 16px; margin-top: 25px; overflow: hidden; position: relative;
        }
        .game-header { background: #111; padding: 10px 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #333; }
        .game-title { font-family: monospace; font-size: 12px; color: #00ffaa; }
        .game-score { font-family: monospace; font-size: 14px; color: var(--volt); font-weight: bold; }
        canvas { width: 100%; display: block; image-rendering: pixelated; background: #050505; }
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .btn-play { background: transparent; color: var(--volt); border: 2px solid var(--volt); padding: 10px 20px; font-family: monospace; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .btn-play:active { background: var(--volt); color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">VOLT<span>AI</span></div>
        <div style="font-size: 11px; font-weight: 800; color: var(--volt);">● ON-CHAIN</div>
    </div>

    <div class="main-card">
        <div class="personal-card">
            <div><span class="stat-label">Allocation</span><span class="p-val" id="my-volt">0.00 VOLT</span></div>
            <div style="text-align: right;"><span class="stat-label">Invested</span><span id="my-usd" style="font-weight: 900;">0.00 USDT</span></div>
        </div>
        <div class="stats-row">
            <div><span class="stat-label">Current Phase</span><span class="stat-value" id="phase-num">Phase 1</span></div>
            <div style="text-align: right;"><span class="stat-label">Total Raised</span><span class="stat-value" id="total-raised" style="color: var(--volt);">0.00 USDT</span></div>
        </div>
        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 5px;">
                <span id="percent-text">0%</span>
                <span id="goal-text">Goal: 50,000</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="progress-bar"></div></div>
        </div>
        <div id="payment-area" class="payment-zone">
            <span class="stat-label">Send USDT (TRC20) to:</span>
            <span class="wallet-addr">TDMdmJJriad71a4tHYCqruLggtJZ8gz1Lc</span>
            <input type="text" id="tx-hash" class="tx-input" placeholder="Paste TxID here">
            <button class="btn-main" style="background: linear-gradient(90deg, #00ffaa, #00cc88);" onclick="submitTx()">Verify Deposit</button>
        </div>
        <button class="btn-main" id="buy-btn" onclick="showPay()">Participate</button>
    </div>

    <div class="game-wrapper">
        <div class="game-header">
            <span class="game-title">Volt Cyber-Racer</span>
            <span class="game-score" id="race-score">ENG: 0.000</span>
        </div>
        <canvas id="raceCanvas" width="300" height="200"></canvas>
        <div class="game-overlay" id="raceStart">
            <button class="btn-play" onclick="initRace()">START ENGINE</button>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="game-header">
            <span class="game-title">Volt Battle City</span>
            <span class="game-score" id="tank-score">ENG: 0.000</span>
        </div>
        <canvas id="tankCanvas" width="300" height="250"></canvas>
        <div class="game-overlay" id="tankStart">
            <button class="btn-play" onclick="initTanks()">START MISSION</button>
            <span style="font-family:monospace; font-size:10px; color:#555; margin-top:10px;">Tap edges to move / Center to fire</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#030305';
        
        // --- ОБЩАЯ ЭКОНОМИКА (Копейки) ---
        let globalScore = localStorage.getItem('v_score') ? parseFloat(localStorage.getItem('v_score')) : 0;
        const updateUI = () => {
            const s = globalScore.toFixed(3);
            document.getElementById('race-score').innerText = 'ENG: ' + s;
            document.getElementById('tank-score').innerText = 'ENG: ' + s;
            localStorage.setItem('v_score', globalScore);
        };
        updateUI();

        // --- 1. ЛОГИКА ПРЕСЕЙЛА (Полностью исправлена) ---
        const params = new URLSearchParams(window.location.search);
        const raised = parseFloat(params.get('raised') || 0);
        const goal = parseFloat(params.get('goal') || 50000);
        const phase = params.get('phase') || 1;
        const myVolt = parseFloat(params.get('volt') || 0);
        const myUsd = parseFloat(params.get('usd') || 0);

        // Заполняем интерфейс реальными данными из бота
        document.getElementById('my-volt').innerText = myVolt.toFixed(2) + ' VOLT';
        document.getElementById('my-usd').innerText = myUsd.toFixed(2) + ' USDT';
        document.getElementById('total-raised').innerText = raised.toFixed(2) + ' USDT';
        document.getElementById('phase-num').innerText = 'Phase ' + phase;
        document.getElementById('goal-text').innerText = 'Goal: ' + goal.toLocaleString();

        // Прогресс бар
        let pct = (raised / goal) * 100;
        setTimeout(() => {
            document.getElementById('progress-bar').style.width = (pct > 100 ? 100 : pct) + '%';
            document.getElementById('percent-text').innerText = pct.toFixed(1) + '%';
        }, 500);

        function showPay() { document.getElementById('payment-area').style.display = 'block'; document.getElementById('buy-btn').style.display = 'none'; }
        function submitTx() { let h = document.getElementById('tx-hash').value; if(h.length > 10) { tg.sendData("txid:"+h); tg.close(); } else { alert("Please enter a valid TxID"); } }

        // --- 2. ЛОГИКА ГОНКИ ---
        const rCanvas = document.getElementById('raceCanvas');
        const rCtx = rCanvas.getContext('2d');
        let rRunning = false, carX = 135, batteries = [], rSpeed = 2;
        
        function initRace() { document.getElementById('raceStart').style.display='none'; rRunning=true; batteries=[]; animateRace(); }
        
        rCanvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            let x = (e.touches[0].clientX - rCanvas.getBoundingClientRect().left); 
            carX = x < rCanvas.clientWidth/2 ? Math.max(10, carX-40) : Math.min(260, carX+40); 
        });

        function animateRace() {
            if(!rRunning) return;
            rCtx.clearRect(0,0,300,200);
            
            // Дорога
            rCtx.fillStyle = '#333';
            for(let i=0; i<5; i++) rCtx.fillRect(148, (performance.now()/10 + i*50)%200 - 20, 4, 20);

            // Машина
            rCtx.fillStyle = '#00ffff'; rCtx.fillRect(carX, 150, 30, 40);

            // Спавн батареек
            if(Math.random() < 0.03) batteries.push({x: Math.random()*270, y: -20});
            
            // Движение батареек и сбор
            rCtx.fillStyle = '#ffae00';
            for(let i = batteries.length - 1; i >= 0; i--) {
                let b = batteries[i];
                b.y += rSpeed;
                rCtx.fillRect(b.x, b.y, 15, 15);
                
                // Столкновение с машиной
                if(carX < b.x+15 && carX+30 > b.x && 150 < b.y+15 && 190 > b.y) {
                    globalScore += 0.001; updateUI();
                    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    batteries.splice(i, 1);
                } else if(b.y > 200) {
                    batteries.splice(i, 1);
                }
            }
            requestAnimationFrame(animateRace);
        }

        // --- 3. ЛОГИКА ТАНКОВ ---
        const tCanvas = document.getElementById('tankCanvas');
        const tCtx = tCanvas.getContext('2d');
        let tRunning = false;
        let pTank = {x: 140, y: 200, d: 'U'};
        let bullets = [], walls = [];

        // Создаем стены
        function generateWalls() {
            walls = [];
            for(let i=0; i<6; i++) {
                walls.push({x: 40 + Math.random()*200, y: 40 + Math.random()*120});
            }
        }

        function initTanks() { document.getElementById('tankStart').style.display='none'; tRunning=true; generateWalls(); animateTanks(); }

        tCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = tCanvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left, y = e.touches[0].clientY - rect.top;
            const w = rect.width, h = rect.height;
            
            // Зона стрельбы (центр экрана)
            if(x > w*0.3 && x < w*0.7 && y > h*0.3 && y < h*0.7) {
                bullets.push({x: pTank.x+8, y: pTank.y+8, d: pTank.d});
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            } else {
                // Движение
                if(y < h*0.3) { pTank.d='U'; pTank.y = Math.max(0, pTank.y-15); }
                else if(y > h*0.7) { pTank.d='D'; pTank.y = Math.min(230, pTank.y+15); }
                else if(x < w*0.3) { pTank.d='L'; pTank.x = Math.max(0, pTank.x-15); }
                else if(x > w*0.7) { pTank.d='R'; pTank.x = Math.min(280, pTank.x+15); }
            }
        });

        function animateTanks() {
            if(!tRunning) return;
            tCtx.clearRect(0,0,300,250);
            
            // Кирпичные стены
            tCtx.fillStyle = '#a65628';
            walls.forEach(w => {
                tCtx.fillRect(w.x, w.y, 20, 20);
                tCtx.fillStyle = '#000'; tCtx.fillRect(w.x+9, w.y, 2, 20); tCtx.fillRect(w.x, w.y+9, 20, 2); tCtx.fillStyle = '#a65628';
            });

            // Игрок (Танк)
            tCtx.fillStyle = '#00ffaa';
            tCtx.fillRect(pTank.x, pTank.y, 20, 20);
            // Пушка
            tCtx.fillStyle = '#fff';
            if(pTank.d=='U') tCtx.fillRect(pTank.x+8, pTank.y-6, 4, 10);
            if(pTank.d=='D') tCtx.fillRect(pTank.x+8, pTank.y+16, 4, 10);
            if(pTank.d=='L') tCtx.fillRect(pTank.x-6, pTank.y+8, 10, 4);
            if(pTank.d=='R') tCtx.fillRect(pTank.x+16, pTank.y+8, 10, 4);

            // Пули
            tCtx.fillStyle = '#ffae00';
            for(let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                if(b.d=='U') b.y-=5; if(b.d=='D') b.y+=5; if(b.d=='L') b.x-=5; if(b.d=='R') b.x+=5;
                tCtx.fillRect(b.x, b.y, 4, 4);
                
                // Проверка попадания в стены
                let hit = false;
                for(let wi = walls.length - 1; wi >= 0; wi--) {
                    let w = walls[wi];
                    if(b.x > w.x && b.x < w.x+20 && b.y > w.y && b.y < w.y+20) {
                        walls.splice(wi, 1);
                        bullets.splice(i, 1);
                        globalScore += 0.001; updateUI();
                        hit = true;
                        if(walls.length === 0) setTimeout(generateWalls, 1000); // Респаун кирпичей
                        break;
                    }
                }
                if(!hit && (b.x < 0 || b.x > 300 || b.y < 0 || b.y > 250)) bullets.splice(i, 1);
            }

            requestAnimationFrame(animateTanks);
        }
    </script>
</body>
</html>
